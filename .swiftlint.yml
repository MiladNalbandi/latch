# SwiftLint configuration for Latch.
# Run locally: `make lint` (requires `brew install swiftlint`).

included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData
  - design          # third-party design-system reference (JS/CSS), not our Swift
  - "**/*.generated.swift"

# Opt-in rules that catch real smells without being noisy.
opt_in_rules:
  - empty_string
  - first_where
  - contains_over_first_not_nil
  - last_where
  - sorted_first_last
  - redundant_nil_coalescing
  - toggle_bool
  - unused_optional_binding
  - explicit_init
  - closure_spacing
  - operator_usage_whitespace
  - overridden_super_call
  - prohibited_super_call
  - fatal_error_message
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - todo                 # we intentionally track follow-ups in specs, not as failures
  - trailing_comma       # SwiftFormat owns comma style
  - redundant_optional_initialization   # we keep explicit `= nil` (matches .swiftformat)
  - switch_case_alignment                # single-line switch cases are fine here
  - void_function_in_ternary             # compact Void ternaries are intentional
  - statement_position                   # SwiftFormat owns brace/else placement

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 700
  ignore_comment_only_lines: true

function_body_length:
  warning: 70
  error: 120

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  # Allow short, conventional names (loop indices, closure params, math vars). Best-practice
  # configs commonly permit these; we cap the upper bound instead.
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 50
    error: 60

type_name:
  min_length: 3
  max_length: 45

nesting:
  type_level: 2

reporter: "xcode"
