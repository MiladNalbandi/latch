name: Latch
options:
  bundleIdPrefix: com.latch
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  LatchEngine:
    type: framework
    platform: macOS
    sources:
      - path: Sources/LatchEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.latch.engine
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES

  LatchApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/LatchApp
    dependencies:
      - target: LatchEngine
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.latch.app
        PRODUCT_NAME: Latch
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: Latch
        CODE_SIGN_ENTITLEMENTS: Sources/LatchApp/Resources/Latch.entitlements

  LatchEngineTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/LatchEngineTests
    dependencies:
      - target: LatchEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.latch.engine.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LatchApp:
    build:
      targets:
        LatchApp: all
    run:
      config: Debug
  LatchEngineTests:
    build:
      targets:
        LatchEngine: all
        LatchEngineTests: all
    test:
      config: Debug
      targets:
        - LatchEngineTests
