name: pasta
options:
  bundleIdPrefix: com.pasta
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  PastaEngine:
    type: framework
    platform: macOS
    sources:
      - path: Sources/PastaEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pasta.engine
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES

  PastaApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/PastaApp
    dependencies:
      - target: PastaEngine
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pasta.app
        PRODUCT_NAME: pasta
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: pasta
        CODE_SIGN_ENTITLEMENTS: Sources/PastaApp/Resources/pasta.entitlements

  PastaEngineTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PastaEngineTests
    dependencies:
      - target: PastaEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pasta.engine.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PastaApp:
    build:
      targets:
        PastaApp: all
    run:
      config: Debug
  PastaEngineTests:
    build:
      targets:
        PastaEngine: all
        PastaEngineTests: all
    test:
      config: Debug
      targets:
        - PastaEngineTests
