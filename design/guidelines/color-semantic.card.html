<!-- @dsCard group="Colors" viewport="700x150" name="Accent & Semantic" subtitle="Amber accent, secure-blue, and status colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--paper-50); padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .chip { border-radius: var(--radius-md); padding: 10px 12px; box-shadow: var(--shadow-sm); }
  .dot { width: 100%; height: 34px; border-radius: var(--radius-sm); margin-bottom: 8px; }
  .chip b { display: block; font-size: 12px; font-weight: 600; color: var(--ink-900); }
  .chip span { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="chip"><div class="dot" style="background:var(--amber-500)"></div><b>Accent</b><span>amber-500</span></div>
    <div class="chip"><div class="dot" style="background:var(--blue-500)"></div><b>Secure</b><span>blue-500</span></div>
    <div class="chip"><div class="dot" style="background:var(--green-500)"></div><b>Success</b><span>green-500</span></div>
    <div class="chip"><div class="dot" style="background:var(--amber-500)"></div><b>Warning</b><span>amber-500</span></div>
    <div class="chip"><div class="dot" style="background:var(--red-500)"></div><b>Danger</b><span>red-500</span></div>
  </div>
</body>
</html>
