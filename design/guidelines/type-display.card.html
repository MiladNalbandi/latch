<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--paper-50); padding: 18px 22px; color: var(--ink-900); }
  .x { font-family: var(--font-display); font-weight: 700; letter-spacing: var(--tracking-tight); line-height: 1.05; margin: 0 0 4px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="x" style="font-size:42px;">Copy once. Paste anywhere.</p>
  <p class="x" style="font-size:25px; font-weight:600; color:var(--green-600);">Your clipboard, with a memory.</p>
  <p class="meta">Display 4xl / 42px / 700 · &nbsp; 2xl / 25px / 600 · &nbsp; tracking −0.02em · &nbsp; leading 1.05</p>
</body>
</html>
