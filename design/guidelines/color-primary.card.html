<!-- @dsCard group="Colors" viewport="700x150" name="Latch Green (Primary)" subtitle="The brand signal — go, secure, calm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--paper-50); padding: 18px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw b { font-size: 12px; font-weight: 600; }
  .sw span { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
  .light b, .light span { color: #fff; }
  .dark b, .dark span { color: var(--ink-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--green-700)"><b>700</b><span>#0a6a4a</span></div>
    <div class="sw light" style="background:var(--green-600)"><b>600</b><span>#0e8c63</span></div>
    <div class="sw light" style="background:var(--green-500)"><b>500 ·primary</b><span>#12a877</span></div>
    <div class="sw light" style="background:var(--green-400)"><b>400</b><span>#2cc18f</span></div>
    <div class="sw dark" style="background:var(--green-300)"><b>300</b><span>#7adcbb</span></div>
    <div class="sw dark" style="background:var(--green-100)"><b>100</b><span>#d6f2e6</span></div>
    <div class="sw dark" style="background:var(--green-50)"><b>50</b><span>#ecfaf3</span></div>
  </div>
</body>
</html>
