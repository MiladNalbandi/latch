<!-- @dsCard group="Type" viewport="700x150" name="Mono & Keycaps — JetBrains Mono" subtitle="Shortcuts, hashes, code, timestamps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--paper-50); padding: 18px 22px; color: var(--ink-900); display: flex; gap: 28px; align-items: center; }
  .keys { display: flex; gap: 6px; }
  kbd {
    font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--ink-800);
    background: var(--paper-0); border: 1px solid var(--line-strong); border-bottom-width: 2px;
    border-radius: var(--radius-keycap); padding: 7px 11px; min-width: 16px; text-align: center;
    box-shadow: var(--shadow-keycap);
  }
  .stk { display: flex; flex-direction: column; gap: 4px; }
  .mono-line { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .hash { color: var(--green-600); }
</style>
</head>
<body>
  <div class="keys">
    <kbd>⌘</kbd><kbd>⇧</kbd><kbd>V</kbd>
  </div>
  <div class="stk">
    <span class="mono-line">copied <span class="hash">2m ago</span> · 14 chars</span>
    <span class="mono-line">sha256 <span class="hash">a91f…7c0e</span></span>
    <span class="mono-line">JetBrains Mono · 400 / 500 / 600 / 700</span>
  </div>
</body>
</html>
