<!-- @dsCard group="Type" viewport="700x200" name="Body & UI — Hanken Grotesk" subtitle="Interface text, labels, paragraphs" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--paper-50); padding: 18px 22px; color: var(--ink-900); }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--green-600); margin: 0 0 6px; }
  .lead { font-size: 17px; font-weight: 500; color: var(--ink-900); margin: 0 0 6px; }
  .body { font-size: 15px; line-height: 1.5; color: var(--text-body); margin: 0 0 8px; max-width: 560px; }
  .label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <p class="eyebrow">Eyebrow · 11px / 700 / caps</p>
  <p class="lead">Latch keeps your last 200 copies a keystroke away.</p>
  <p class="body">Body text sits at 15px with 1.5 line height — calm, legible, never shouty. Hold <b>⌘⇧V</b> and your history fans out right where your cursor is.</p>
  <span class="label">Label / 13px / 600 &nbsp;·&nbsp; </span><span class="meta">md 15 · lg 17 · sm 13 · weights 400–800</span>
</body>
</html>
