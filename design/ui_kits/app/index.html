<!-- @startingPoint section="Latch App" subtitle="macOS clipboard history panel" viewport="1280x720" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Latch — Clipboard</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  /* When the accent changes, var(--primary)-based colors won't repaint through an
     in-flight CSS transition (Chromium quirk) — suppress transitions for that frame. */
  .latch-no-transition * { transition: none !important; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow: hidden; }

  /* ---------- Desktop scene ---------- */
  .desk {
    position: relative; height: 100vh; width: 100%; overflow: hidden;
    /* Derive every accent shade from one --primary so the macOS accent picker recolors everything live */
    --primary-hover: color-mix(in srgb, var(--primary) 86%, #000);
    --primary-press: color-mix(in srgb, var(--primary) 72%, #000);
    --primary-tint: color-mix(in srgb, var(--primary) 16%, #fff);
    --primary-tint-soft: color-mix(in srgb, var(--primary) 8%, #fff);
    --border-focus: var(--primary);
    --focus-ring: color-mix(in srgb, var(--primary) 38%, transparent);
    background:
      radial-gradient(46% 42% at 7% 6%, rgba(242,165,44,0.42), transparent 55%),
      radial-gradient(44% 40% at 96% 30%, rgba(47,111,237,0.32), transparent 58%),
      radial-gradient(40% 50% at 60% 108%, rgba(122,220,187,0.40), transparent 60%),
      radial-gradient(120% 110% at 82% 4%, #1fae84 0%, #0e8c7f 36%, #0a5d6e 68%, #0b3a52 100%);
  }
  .desk::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(60% 50% at 50% 120%, rgba(0,0,0,0.28), transparent 70%);
  }

  /* ---------- Menu bar ---------- */
  .mb {
    position: relative; z-index: 5; height: 28px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 12px;
    background: var(--glass-ink); backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    box-shadow: var(--glass-highlight-ink);
    color: #fff; font-size: 13px;
  }
  .mb__left, .mb__right { display: flex; align-items: center; gap: 16px; }
  .mb__apple { display: inline-flex; opacity: 0.95; }
  .mb__app { font-weight: 700; }
  .mb__menu { opacity: 0.9; font-weight: 500; }
  .mb__right { gap: 12px; }
  .mb__status { display: inline-flex; opacity: 0.9; }
  .mb__latch {
    display: inline-flex; align-items: center; gap: 5px; color: #fff;
    background: transparent; border: none; cursor: pointer; padding: 3px 7px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    transition: background var(--dur-fast) var(--ease-out);
  }
  .mb__latch:hover { background: rgba(255,255,255,0.16); }
  .mb__latch.is-on { background: var(--primary); }
  .mb__count { font-variant-numeric: tabular-nums; }
  .mb__clock { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ---------- Desktop idle hint ---------- */
  .desk__hint { position: absolute; inset: 0; display: grid; place-items: center; }
  .desk__hint-card {
    display: flex; align-items: center; gap: 18px; color: #fff;
    background: var(--glass-ink); backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    border: 0.5px solid var(--glass-border-ink); border-radius: var(--radius-lg);
    padding: 18px 22px; box-shadow: var(--glass-highlight-ink), var(--shadow-lg); max-width: 520px;
  }
  .desk__hint-icon { display: inline-flex; opacity: 0.9; }
  .desk__hint-text { flex: 1; min-width: 0; }
  .desk__hint-card b { font-size: 15px; }
  .desk__hint-sub { font-size: 13px; opacity: 0.82; margin-top: 3px; line-height: 1.5; }
  /* the shortcut is the hero — sits on the right, slightly separated by a hairline */
  .desk__hint-keys { flex: none; padding-left: 18px; border-left: 0.5px solid rgba(255,255,255,0.18); }
  .desk__hint-keys .ltch-kbd__cap { background: rgba(255,255,255,0.16); color: #fff; border-color: rgba(0,0,0,0.3); }

  /* ---------- Panel shell ---------- */
  .desk__panel {
    position: absolute; top: 64px; left: 50%; transform: translateX(-50%);
    width: 720px; z-index: 10; animation: panelIn var(--dur-slow) var(--ease-spring);
  }
  /* Transform-only entrance: content stays fully visible even if the animation clock is paused. */
  @keyframes panelIn { from { transform: translateX(-50%) translateY(-10px) scale(0.98); } to { transform: translateX(-50%) translateY(0) scale(1); } }
  @keyframes modalIn { from { transform: translateY(-10px) scale(0.98); } to { transform: translateY(0) scale(1); } }
  @media (prefers-reduced-motion: reduce) { .desk__panel, .ls, .lp__toast { animation: none !important; } }

  .lp {
    background: var(--glass-strong);
    backdrop-filter: blur(var(--blur-thick)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--blur-thick)) saturate(var(--glass-saturate));
    border: 0.5px solid var(--glass-border); border-radius: var(--radius-panel);
    box-shadow: var(--glass-highlight), var(--shadow-panel); overflow: hidden; outline: none;
  }
  .lp__header { display: flex; align-items: center; gap: 10px; padding: 12px 14px 10px; }
  .lp__searchwrap { flex: 1; }
  /* native translucent search field */
  .lp__searchwrap .ltch-input { height: 40px; font-size: 16px; background: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.7); box-shadow: var(--glass-highlight), 0 1px 2px rgba(17,20,26,0.05); }
  .lp__searchwrap .ltch-input:focus-within { background: rgba(255,255,255,0.82); border-color: var(--border-focus); }
  .lp__searchwrap .ltch-input__el { font-size: 16px; }

  .lp__filters { display: flex; gap: 6px; padding: 0 14px 10px; border-bottom: 0.5px solid var(--glass-hairline); }
  .lp__filter {
    font-family: var(--font-sans); font-size: 12.5px; font-weight: 600; color: var(--text-muted);
    background: transparent; border: none; cursor: pointer; padding: 5px 11px; border-radius: var(--radius-full);
    transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }
  .lp__filter:hover { background: rgba(255,255,255,0.4); color: var(--text-body); }
  /* selected = a calm white chip with accent-tinted text — no harsh saturated fill, and
     stays legible across every system accent (incl. light ones like yellow). */
  .lp__filter.is-on { background: rgba(255,255,255,0.92); color: var(--primary-press); box-shadow: var(--shadow-sm); }

  .lp__body { display: flex; height: 366px; }
  /* sidebar reads as the more-translucent vibrant pane; detail pane is more opaque */
  .lp__list { width: 322px; flex: none; overflow-y: auto; padding: 6px; border-right: 0.5px solid var(--glass-hairline); }
  .lp__list > div { margin-bottom: 2px; }
  .lp__empty { padding: 28px 16px; text-align: center; color: var(--text-faint); font-size: 13px; }

  /* preview */
  .lp-preview { flex: 1; padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; min-width: 0; background: var(--glass-content); box-shadow: var(--glass-highlight); }
  .lp-preview--empty { align-items: center; justify-content: center; }
  .lp-preview__head { display: flex; align-items: center; gap: 8px; }
  .lp-preview__time { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
  .lp-preview__content {
    flex: 1; font-size: 17px; line-height: 1.5; color: var(--text-strong); font-weight: 500;
    overflow: auto; word-break: break-word;
    background: rgba(255,255,255,0.7); border: 0.5px solid var(--glass-border); border-radius: var(--radius-md);
    padding: 14px 16px; box-shadow: var(--glass-highlight), var(--inset-field);
  }
  .lp-preview__content.is-mono { font-family: var(--font-mono); font-size: 14px; font-weight: 500; }
  .lp-preview__color { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .lp-preview__swatch { flex: 1; border-radius: var(--radius-md); box-shadow: var(--shadow-sm), inset 0 0 0 1px rgba(0,0,0,0.06); min-height: 120px; }
  .lp-preview__hex { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--text-strong); }
  .lp-preview__meta { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--text-muted); flex-wrap: wrap; }
  .lp-preview__meta b { color: var(--text-body); }
  .lp-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-200); }
  .lp-secure { display: inline-flex; align-items: center; gap: 5px; color: var(--blue-600); font-weight: 600; }
  .lp-preview__actions { display: flex; align-items: center; gap: 10px; }

  /* footer */
  .lp__footer {
    display: flex; align-items: center; gap: 18px; padding: 10px 16px;
    background: var(--glass-ink-strong); backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    box-shadow: var(--glass-highlight-ink);
    color: rgba(255,255,255,0.72); font-size: 12px;
  }
  .lp__hint { display: inline-flex; align-items: center; gap: 7px; font-weight: 500; }

  /* toast */
  .lp__toast {
    position: absolute; bottom: 58px; left: 50%; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--glass-ink-strong); backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--blur)) saturate(var(--glass-saturate));
    color: #fff; font-size: 13px; font-weight: 600;
    padding: 9px 16px; border-radius: var(--radius-full); box-shadow: var(--glass-highlight-ink), var(--shadow-xl);
    animation: toastIn var(--dur-base) var(--ease-spring);
  }
  .lp__toast svg { color: var(--green-400); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* ---------- Settings window ---------- */
  .desk__modal { position: absolute; inset: 0; z-index: 20; display: grid; place-items: center; padding-top: 28px; background: rgba(8,18,16,0.16); }
  .ls {
    width: 560px; border-radius: 13px; overflow: hidden;
    background: var(--glass-strong);
    backdrop-filter: blur(var(--blur-thick)) saturate(var(--glass-saturate));
    -webkit-backdrop-filter: blur(var(--blur-thick)) saturate(var(--glass-saturate));
    box-shadow: var(--glass-highlight), var(--shadow-xl); border: 0.5px solid var(--glass-border);
    animation: modalIn var(--dur-base) var(--ease-out);
  }
  .ls__titlebar { position: relative; height: 42px; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; background: transparent; border-bottom: 0.5px solid var(--glass-hairline); }
  .ls__traffic { display: flex; gap: 8px; }
  .tl { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12); }
  .tl--r { background: #ec6a5e; } .tl--y { background: #f4bf4f; } .tl--g { background: #61c554; }
  .ls__title { font-size: 13px; font-weight: 600; color: var(--text-body); }
  /* segmented-control tabs */
  .ls__tabs { display: flex; justify-content: center; gap: 2px; margin: 12px auto 6px; padding: 3px; background: rgba(17,20,26,0.06); border-radius: 9px; width: max-content; }
  .ls__tab {
    display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-sans);
    font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer;
    background: transparent; border: none; padding: 6px 14px; border-radius: 7px;
    transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }
  .ls__tab:hover { color: var(--text-body); }
  .ls__tab.is-on { background: rgba(255,255,255,0.92); color: var(--green-700); box-shadow: var(--shadow-sm); }
  .ls__body { padding: 14px 18px 20px; max-height: 460px; overflow-y: auto; }

  .ls-section { margin-bottom: 18px; }
  .ls-section__title { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-faint); margin: 0 4px 8px; }
  .ls-card { background: rgba(255,255,255,0.72); border: 0.5px solid var(--glass-border); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--glass-highlight); }
  .ls-row { display: flex; align-items: center; gap: 16px; padding: 13px 16px; border-bottom: 0.5px solid var(--glass-hairline); }
  .ls-row:last-child { border-bottom: none; }
  .ls-row__text { flex: 1; min-width: 0; }
  .ls-row__title { font-size: 14px; font-weight: 500; color: var(--text-strong); }
  .ls-row__desc { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; line-height: 1.45; }
  .ls-row__control { flex: none; }

  .ls-banner {
    display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; margin-bottom: 18px;
    background: var(--secure-tint); border-radius: var(--radius-card); color: var(--blue-600);
  }
  .ls-banner b { color: var(--ink-900); font-size: 13.5px; }
  .ls-banner div div { color: var(--text-muted); font-size: 12.5px; margin-top: 3px; line-height: 1.45; }
  .ls-foot { display: flex; justify-content: flex-start; }

  /* macOS-style accent color picker */
  .ls-accents { display: flex; gap: 10px; align-items: center; }
  .ls-accent {
    width: 22px; height: 22px; border-radius: 50%; border: none; cursor: pointer; padding: 0;
    display: grid; place-items: center;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.18);
    transition: transform var(--dur-fast) var(--ease-out);
  }
  .ls-accent:hover { transform: scale(1.12); }
  .ls-accent.is-on { box-shadow: 0 0 0 2px var(--glass-strong), 0 0 0 4px currentColor, inset 0 0 0 0.5px rgba(0,0,0,0.18); }
</style>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="Icons.js"></script>
</head>

<script type="text/babel" src="LatchSettings.jsx" data-presets="react"></script>
