name: CI

on:
  push:
    branches: [ "claude/clipboard-history-mvp-5vqkt4", "main" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15   # Xcode 16.x — matches the project format XcodeGen 2.45+ emits
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          set -o pipefail
          xcodebuild \
            -project pasta.xcodeproj \
            -scheme PastaApp \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Run engine tests
        run: |
          set -o pipefail
          xcodebuild \
            -project pasta.xcodeproj \
            -scheme PastaEngineTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            test

  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging
